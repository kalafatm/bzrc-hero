<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bzrcMaster — ERD v3.0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    overflow: hidden;
    height: 100vh;
  }
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border-bottom: 1px solid #334155;
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  #header h1 {
    font-size: 18px; font-weight: 700; color: #f8fafc;
    display: flex; align-items: center; gap: 10px;
  }
  #header h1 span.logo {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: white; padding: 4px 10px; border-radius: 6px; font-size: 14px;
  }
  #header .info {
    font-size: 12px; color: #94a3b8;
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
  }
  #header .info .badge {
    background: #1e293b; border: 1px solid #334155;
    padding: 3px 10px; border-radius: 12px; font-size: 11px;
  }
  .legend {
    display: flex; gap: 14px; align-items: center;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px; font-size: 11px; color: #94a3b8;
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 3px;
  }
  #canvas {
    position: absolute; top: 52px; left: 0; right: 0; bottom: 0;
    overflow: auto; cursor: grab;
  }
  #canvas.grabbing { cursor: grabbing; }
  #diagram {
    position: relative;
    width: 2400px;
    height: 1600px;
    min-width: 100%;
    min-height: 100%;
  }
  svg#lines {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 1;
  }
  .table-card {
    position: absolute;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    min-width: 240px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    z-index: 10;
    cursor: move;
    transition: box-shadow 0.2s;
    user-select: none;
  }
  .table-card:hover {
    box-shadow: 0 8px 30px rgba(59,130,246,0.15);
  }
  .table-card.dragging {
    box-shadow: 0 12px 40px rgba(59,130,246,0.3);
    z-index: 50;
  }
  .table-header {
    padding: 10px 14px;
    border-radius: 9px 9px 0 0;
    font-weight: 700;
    font-size: 13px;
    display: flex; align-items: center; justify-content: space-between;
    letter-spacing: 0.3px;
  }
  .table-header .db-name {
    font-size: 10px; font-weight: 400; opacity: 0.7;
  }
  .table-body { padding: 6px 0; }
  .section-label {
    padding: 4px 14px 2px;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #475569;
    border-top: 1px solid #334155;
    margin-top: 2px;
  }
  .field-row {
    display: flex; align-items: center;
    padding: 3px 14px;
    font-size: 12px;
    gap: 8px;
    line-height: 1.5;
  }
  .field-row:hover { background: rgba(255,255,255,0.03); }
  .field-icon {
    width: 14px; text-align: center; flex-shrink: 0;
    font-size: 10px;
  }
  .field-icon.pk { color: #fbbf24; }
  .field-icon.fk { color: #60a5fa; }
  .field-icon.idx { color: #a78bfa; }
  .field-name {
    flex: 1; color: #e2e8f0; font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-size: 11.5px;
  }
  .field-name.pk { font-weight: 700; }
  .field-name.fk { color: #93c5fd; }
  .field-type {
    color: #64748b; font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
    font-size: 10px; text-align: right;
  }
  .field-nullable { color: #475569; font-size: 9px; }
  .table-footer {
    padding: 5px 14px; border-top: 1px solid #334155;
    font-size: 10px; color: #64748b;
  }
  .table-footer .unique-badge {
    display: inline-block; background: #1e1b4b; color: #818cf8;
    padding: 1px 6px; border-radius: 4px; margin: 1px 2px; font-size: 9px;
  }
  .table-footer .index-badge {
    display: inline-block; background: #1a1a2e; color: #a78bfa;
    padding: 1px 6px; border-radius: 4px; margin: 1px 2px; font-size: 9px;
  }

  /* Color themes */
  .theme-shipping .table-header { background: linear-gradient(135deg, #059669, #047857); color: #ecfdf5; }
  .theme-shipping { border-color: #047857; }
  .theme-cache .table-header { background: linear-gradient(135deg, #d97706, #b45309); color: #fffbeb; }
  .theme-cache { border-color: #b45309; }
  .theme-external .table-header { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #f5f3ff; }
  .theme-external { border-color: #6d28d9; }
  .theme-sheets .table-header { background: linear-gradient(135deg, #0891b2, #0e7490); color: #ecfeff; }
  .theme-sheets { border-color: #0e7490; }
  .theme-api .table-header { background: linear-gradient(135deg, #dc2626, #b91c1c); color: #fef2f2; }
  .theme-api { border-color: #b91c1c; }

  /* Zoom controls */
  #zoom-controls {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    display: flex; gap: 6px; background: #1e293b; border: 1px solid #334155;
    padding: 6px; border-radius: 10px;
  }
  #zoom-controls button {
    background: #334155; color: #e2e8f0; border: none;
    width: 32px; height: 32px; border-radius: 6px;
    cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  }
  #zoom-controls button:hover { background: #475569; }
  #zoom-level { font-size: 11px; color: #94a3b8; display: flex; align-items: center; padding: 0 6px; }
</style>
</head>
<body>

<div id="header">
  <h1>
    <span class="logo">BM</span>
    bzrcMaster — ERD v3.0
  </h1>
  <div class="info">
    <div class="legend">

// Define relationships
const relationships = [
  { from: 'shipment_items', fromField: 'shipment_id', to: 'shipments', toField: 'id', type: 'many-to-one' },
  { from: 'shipments', fromField: 'woo_order_id', to: 'woo_orders', toField: 'id', type: 'many-to-one' },
  { from: 'shipments', fromField: 'carrier_code', to: 'api_naqel', toField: 'POST /Shipments', type: 'many-to-one', dashed: true },
  { from: 'woo_orders', fromField: 'shipping.country', to: 'sheet_exit', toField: 'destinationCountry', type: 'many-to-one', dashed: true },
  { from: 'woo_orders', fromField: 'shipping.city', to: 'sheet_cities', toField: 'cityEN', type: 'many-to-one', dashed: true },
  { from: 'sheet_carrier', fromField: 'carrierCode', to: 'shipments', toField: 'carrier_code', type: 'many-to-one', dashed: true },
];

const themeColors = {
  shipping: '#059669',
  cache: '#d97706',
  external: '#7c3aed',
  sheets: '#0891b2',
  api: '#dc2626',
};

// Render tables
const diagram = document.getElementById('diagram');
const tableElements = {};

tables.forEach(table => {
  const card = document.createElement('div');
  card.className = `table-card theme-${table.theme}`;
  card.id = `table-${table.id}`;
  card.style.left = table.x + 'px';
  card.style.top = table.y + 'px';

  let html = `<div class="table-header">
    <span>${table.model}</span>
    <span class="db-name">${table.dbName}</span>
  </div>
  <div class="table-body">`;

  (table.sections || []).forEach(f => {
    if (f.label) {
      html += `<div class="section-label">${f.label}</div>`;
      return;
    }
    const icon = f.pk ? '<span class="field-icon pk">&#x1F511;</span>' :
                 f.fk ? '<span class="field-icon fk">&#x1F517;</span>' :
                 f.idx ? '<span class="field-icon idx">&#x21C5;</span>' :
                 f.unique ? '<span class="field-icon" style="color:#818cf8">&#x26A1;</span>' :
                 '<span class="field-icon"></span>';
    const nameClass = f.pk ? 'field-name pk' : f.fk ? 'field-name fk' : 'field-name';
    const nullable = f.nullable ? '<span class="field-nullable">?</span>' : '';
    html += `<div class="field-row" data-field="${f.name}">
      ${icon}
      <span class="${nameClass}">${f.name}</span>
      ${nullable}
      <span class="field-type">${f.type}</span>
    </div>`;
  });

  html += '</div>';
  card.innerHTML = html;
  diagram.appendChild(card);
  tableElements[table.id] = card;
});

// Draw relationship lines
function getFieldPosition(tableId, fieldName, side) {
  const card = tableElements[tableId];
  if (!card) return { x: 0, y: 0 };
  const rect = card.getBoundingClientRect();
  const diagramRect = diagram.getBoundingClientRect();
  const fieldRow = card.querySelector(`[data-field="${fieldName}"]`);

  let y;
  if (fieldRow) {
    const fieldRect = fieldRow.getBoundingClientRect();
    y = fieldRect.top - diagramRect.top + fieldRect.height / 2;
  } else {
    y = rect.top - diagramRect.top + rect.height / 2;
  }

  if (side === 'left') {
    return { x: rect.left - diagramRect.left, y };
  } else {
    return { x: rect.right - diagramRect.left, y };
  }
}

function drawLines() {
  const svg = document.getElementById('lines');
  svg.innerHTML = '';

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

  const markerOne = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  markerOne.setAttribute('id', 'arrow-one');
  markerOne.setAttribute('viewBox', '0 0 10 10');
  markerOne.setAttribute('refX', '8'); markerOne.setAttribute('refY', '5');
  markerOne.setAttribute('markerWidth', '8'); markerOne.setAttribute('markerHeight', '8');
  markerOne.setAttribute('orient', 'auto');
  const pathOne = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  pathOne.setAttribute('d', 'M 0 1 L 8 5 L 0 9');
  pathOne.setAttribute('fill', 'none'); pathOne.setAttribute('stroke', '#475569');
  pathOne.setAttribute('stroke-width', '1.5');
  markerOne.appendChild(pathOne);
  defs.appendChild(markerOne);

  const markerMany = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  markerMany.setAttribute('id', 'arrow-many');
  markerMany.setAttribute('viewBox', '0 0 12 12');
  markerMany.setAttribute('refX', '0'); markerMany.setAttribute('refY', '6');
  markerMany.setAttribute('markerWidth', '10'); markerMany.setAttribute('markerHeight', '10');
  markerMany.setAttribute('orient', 'auto');
  const pathMany = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  pathMany.setAttribute('d', 'M 10 1 L 0 6 L 10 11');
  pathMany.setAttribute('fill', 'none'); pathMany.setAttribute('stroke', '#475569');
  pathMany.setAttribute('stroke-width', '1.5');
  markerMany.appendChild(pathMany);
  defs.appendChild(markerMany);

  svg.appendChild(defs);

  relationships.forEach(rel => {
    const fromCard = tableElements[rel.from];
    const toCard = tableElements[rel.to];
    if (!fromCard || !toCard) return;

    const fromRect = fromCard.getBoundingClientRect();
    const toRect = toCard.getBoundingClientRect();
    const diagramRect = diagram.getBoundingClientRect();

    const fromCenterX = fromRect.left - diagramRect.left + fromRect.width / 2;
    const toCenterX = toRect.left - diagramRect.left + toRect.width / 2;

    let fromSide = fromCenterX < toCenterX ? 'right' : 'left';
    let toSide = fromCenterX < toCenterX ? 'left' : 'right';

    const from = getFieldPosition(rel.from, rel.fromField, fromSide);
    const to = getFieldPosition(rel.to, rel.toField, toSide);

    const dx = Math.abs(to.x - from.x);
    const controlOffset = Math.max(40, dx * 0.4);
    const cx1 = fromSide === 'right' ? from.x + controlOffset : from.x - controlOffset;
    const cx2 = toSide === 'right' ? to.x + controlOffset : to.x - controlOffset;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${from.x} ${from.y} C ${cx1} ${from.y}, ${cx2} ${to.y}, ${to.x} ${to.y}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', rel.dashed ? '#475569' : '#334155');
    path.setAttribute('stroke-width', '1.5');
    if (rel.dashed) path.setAttribute('stroke-dasharray', '6,4');
    path.setAttribute('marker-start', 'url(#arrow-many)');
    path.setAttribute('marker-end', 'url(#arrow-one)');
    svg.appendChild(path);
  });
}

// Drag and drop
let dragTarget = null;
let dragOffset = { x: 0, y: 0 };

document.addEventListener('mousedown', (e) => {
  const card = e.target.closest('.table-card');
  if (!card) return;
  dragTarget = card;
  dragTarget.classList.add('dragging');
  const rect = card.getBoundingClientRect();
  const diagramRect = diagram.getBoundingClientRect();
  dragOffset.x = e.clientX - (rect.left - diagramRect.left);
  dragOffset.y = e.clientY - (rect.top - diagramRect.top);
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!dragTarget) return;
  const x = e.clientX - dragOffset.x;
  const y = e.clientY - dragOffset.y;
  dragTarget.style.left = Math.max(0, x) + 'px';
  dragTarget.style.top = Math.max(0, y) + 'px';
  drawLines();
});

document.addEventListener('mouseup', () => {
  if (dragTarget) {
    dragTarget.classList.remove('dragging');
    dragTarget = null;
  }
});

// Zoom
let zoomLevel = 1;
const zoomEl = document.getElementById('diagram');

function applyZoom() {
  zoomEl.style.transform = `scale(${zoomLevel})`;
  zoomEl.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoomLevel * 100) + '%';
}

function zoomIn() { zoomLevel = Math.min(2, zoomLevel + 0.1); applyZoom(); }
function zoomOut() { zoomLevel = Math.max(0.3, zoomLevel - 0.1); applyZoom(); }
function zoomReset() { zoomLevel = 1; applyZoom(); }

document.getElementById('canvas').addEventListener('wheel', (e) => {
  e.preventDefault();
  if (e.deltaY < 0) zoomIn(); else zoomOut();
}, { passive: false });

setTimeout(drawLines, 100);
window.addEventListener('resize', drawLines);
</script>
